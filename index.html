<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha - Cenários & Cicatrizes</title>

<style>
body {
    background-color: #0f0f0f;
    color: #e6e6e6;
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    padding: 20px;
}

h1, h2, h3 {
    border-bottom: 1px solid #444;
    padding-bottom: 5px;
}

.section {
    margin-bottom: 30px;
}

input, textarea, select {
    background-color: #1a1a1a;
    color: #fff;
    border: 1px solid #444;
    padding: 5px;
    margin: 3px 0;
    width: 100%;
}

textarea {
    resize: vertical;
    min-height: 60px;
}

.inline {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.inline div {
    flex: 1;
    min-width: 120px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border: 1px solid #444;
    padding: 6px;
}

th {
    background-color: #1c1c1c;
}

button {
    background-color: #222;
    color: #fff;
    border: 1px solid #555;
    padding: 8px 12px;
    cursor: pointer;
    margin: 5px 5px 5px 0;
}

button:hover {
    background-color: #333;
}
</style>
</head>

<body>

<h1>🎲 FICHA - CENÁRIOS & CICATRIZES</h1>

<div class="section">
<button onclick="salvarFicha()">💾 Salvar Ficha</button>
<button onclick="document.getElementById('importarArquivo').click()">📂 Importar Ficha</button>
<input type="file" id="importarArquivo" accept=".json" style="display:none" onchange="importarFicha(event)">
</div>

<div class="section">
<h2>🧍 Informações Básicas</h2>
<input id="nome" placeholder="Nome">
<input id="idade" placeholder="Idade">
<input id="origem" placeholder="Origem">
<input id="classe" placeholder="Classe">

<select id="categoria">
<option>Sobrevivente</option>
<option>Canibal</option>
</select>

<input id="nivel" type="number" placeholder="Nível">
<input id="xp" type="number" placeholder="Experiência">

<textarea id="descricao" placeholder="Descrição Física"></textarea>
<textarea id="cicatrizesVisiveis" placeholder="Cicatrizes Visíveis"></textarea>
<textarea id="codigoPessoal" placeholder="Código Pessoal"></textarea>
</div>

<div class="section">
<h2>⚙️ Atributos</h2>
<div class="inline">
<div>Força <input id="forca" type="number"></div>
<div>Agilidade <input id="agilidade" type="number"></div>
<div>Astúcia <input id="astucia" type="number"></div>
<div>Carisma <input id="carisma" type="number"></div>
<div>Vigor <input id="vigor" type="number"></div>
</div>
</div>

<div class="section">
<h2>❤️ Recursos</h2>
HP Máximo <input id="hpMax" type="number">
HP Atual <input id="hpAtual" type="number">

Fome (0–5) <input id="fome" type="number" min="0" max="5">

Estamina Máxima <input id="estMax" type="number">
Estamina Atual <input id="estAtual" type="number">
</div>

<div class="section">
<h2>🎒 Inventário</h2>
<textarea id="inventario" placeholder="Liste seus itens aqui..."></textarea>
</div>

<div class="section">
<h2>🔥 Habilidades</h2>
<textarea id="habilidades" placeholder="Liste habilidades e custos..."></textarea>
</div>

<div class="section">
<h2>📖 Histórico</h2>
<textarea id="historico"></textarea>
</div>

<script>
function salvarFicha() {
    const inputs = document.querySelectorAll("input, textarea, select");
    let ficha = {};

    inputs.forEach(el => {
        if (el.id) {
            if (el.type === "checkbox") {
                ficha[el.id] = el.checked;
            } else {
                ficha[el.id] = el.value;
            }
        }
    });

    const blob = new Blob([JSON.stringify(ficha, null, 2)], {type: "application/json"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "ficha_cenarios_e_cicatrizes.json";
    a.click();

    URL.revokeObjectURL(url);
}

function importarFicha(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const ficha = JSON.parse(e.target.result);

        Object.keys(ficha).forEach(key => {
            const el = document.getElementById(key);
            if (el) {
                if (el.type === "checkbox") {
                    el.checked = ficha[key];
                } else {
                    el.value = ficha[key];
                }
            }
        });
    };

    reader.readAsText(file);
}
</script>

</body>
</html>
